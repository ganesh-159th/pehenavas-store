name: Comprehensive CI/CD Pipeline

on:
  push:
    branches:
    - '**' # Triggers on every single branch push
  pull_request:
    branches:
    - '**' # Triggers on every pull request

jobs:
  quality-gate:
    name: Code Quality, Tests & Build
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci || npm install

    # Fail-Fast: Detect syntax or build errors immediately
    - name: 🔍 Run Linter
      run: npm run lint --if-present

    - name: 🛠️ Verify Application Build
      run: npm run build

    - name: 🧪 Run Vitest Unit Tests
      run: npx vitest run

    - name: 🌲 Run Cypress E2E Tests
      uses: cypress-io/github-action@v6
      with:
        start: npm run dev
        wait-on: 'http://localhost:5174'

    # Artifact Collection: Store screenshots if tests fail
    - name: 📸 Upload Cypress Screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: cypress-screenshots
        path: cypress/screenshots
        if-no-files-found: ignore
        retention-days: 7

    # Artifact Collection: Store video recordings of tests
    - name: 🎥 Upload Cypress Videos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cypress-videos
        path: cypress/videos
        if-no-files-found: ignore
        retention-days: 7

    # Artifact Collection: Store the compiled application
    - name: 🚀 Upload Production Build Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: production-build
        path: dist/
        retention-days: 7
